name: CodeQL

on:
  push:
    branches: [main, devel]
  pull_request:
    branches: [main]
  schedule:
    # Quartas-feiras às 06:00 UTC — análise semanal completa
    - cron: "0 6 * * 3"

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  analyze:
    name: CodeQL Analysis (Rust)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@2a00a6e621b3efd9d09658ee2b02c1bb4668b985  # v3.36.1
        with:
          languages: rust
          # security-and-quality inclui CWE-top-25, OWASP top-10 e qualidade
          queries: security-and-quality

      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537  # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Build workspace for CodeQL
        run: cargo build --workspace
        env:
          RUSTFLAGS: ""  # CodeQL instrumenta o binário; -D warnings interfere

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@d77b13a0df3134d64a457ea9003f600b09fa1c8a  # v3.36.1
        with:
          category: rust-sast
          # Resultados publicados no separador Security > Code scanning do repositório
