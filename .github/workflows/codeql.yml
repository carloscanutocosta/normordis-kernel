name: CodeQL

on:
  push:
    branches: [main, devel]
  pull_request:
    branches: [main]
  schedule:
    # Quartas-feiras às 06:00 UTC — análise semanal completa
    - cron: "0 6 * * 3"

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  analyze:
    name: CodeQL Analysis (Rust)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@2a00a6e621b3efd9d09658ee2b02c1bb4668b985  # v3.36.1
        with:
          languages: rust
          # security-and-quality inclui CWE-top-25, OWASP top-10 e qualidade
          queries: security-and-quality

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc  # v2.9.1

      - name: Build workspace for CodeQL
        run: cargo build --workspace
        env:
          RUSTFLAGS: ""  # CodeQL instrumenta o binário; -D warnings interfere

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@2a00a6e621b3efd9d09658ee2b02c1bb4668b985  # v3.36.1
        with:
          category: rust-sast
          # Resultados publicados no separador Security > Code scanning do repositório
