name: OpenSSF Scorecard

on:
  schedule:
    # Executa toda segunda-feira às 07:00 UTC
    - cron: "0 7 * * 1"
  push:
    branches: [main]

permissions: read-all

jobs:
  scorecard:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF ao GitHub Code Scanning
      id-token: write          # necessário para publicar resultados no scorecard.dev
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2  # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # Publica em scorecard.dev (visível publicamente — badge + histórico)
          publish_results: true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@2a00a6e621b3efd9d09658ee2b02c1bb4668b985  # v3.36.1
        with:
          sarif_file: scorecard-results.sarif
          category: openssf-scorecard

      - name: Upload scorecard artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1  # v4.6.1
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          retention-days: 90
