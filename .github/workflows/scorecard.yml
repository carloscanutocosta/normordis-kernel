name: OpenSSF Scorecard

on:
  schedule:
    # Executa toda segunda-feira às 07:00 UTC
    - cron: "0 7 * * 1"
  push:
    branches: [main]

permissions: read-all

jobs:
  scorecard:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF ao GitHub Code Scanning
      id-token: write          # necessário para publicar resultados no scorecard.dev
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # Publica em scorecard.dev (visível publicamente — badge + histórico)
          publish_results: true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@2a00a6e621b3efd9d09658ee2b02c1bb4668b985  # v3.36.1
        with:
          sarif_file: scorecard-results.sarif
          category: openssf-scorecard

      - name: Upload scorecard artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          retention-days: 90
