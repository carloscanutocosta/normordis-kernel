name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

# Least-privilege: o job publish sobrepõe com as permissões necessárias.
permissions: read-all

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── 1. Portão de segurança ────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998  # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: EmbarkStudios/cargo-deny-action@8a45e1c7c9a95dfae3276e89a553705e40ae45a2  # v2.0.20
        with:
          command: check
          arguments: --all-features

  # ── 2. Build release em ambas as plataformas ─────────────────────────────
  build-windows:
    name: Build Release (Windows)
    runs-on: windows-latest
    needs: [security-audit, license-check]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      - name: Build release
        run: cargo build --locked --release --workspace
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-windows
          path: target/release/*.dll
          if-no-files-found: warn

  build-linux:
    name: Build Release (Linux)
    runs-on: ubuntu-latest
    needs: [security-audit, license-check]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      - name: Build release
        run: cargo build --locked --release --workspace
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-linux
          path: target/release/*.so
          if-no-files-found: warn

  # ── 3. SBOM CycloneDX ────────────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: [security-audit, license-check]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM
        run: cargo cyclonedx --format json --all
      - name: Collect SBOM files
        run: |
          mkdir -p artifacts/trust
          find . -name "*.cdx.json" -not -path "./target/*" -not -path "./security/*" | head -1 \
            | xargs -I{} cp {} artifacts/trust/sbom.cyclonedx.json || true
      - name: Validate SBOM schema (CycloneDX 1.6)
        run: |
          pip install -q jsonschema
          curl -sSf https://raw.githubusercontent.com/CycloneDX/specification/master/schema/bom-1.6.schema.json \
            -o /tmp/cdx-1.6.schema.json
          python3 - artifacts/trust/sbom.cyclonedx.json <<'PYEOF'
          import json, jsonschema, sys
          sbom_path = sys.argv[1]
          with open("/tmp/cdx-1.6.schema.json") as f:
              schema = json.load(f)
          with open(sbom_path) as f:
              bom = json.load(f)
          try:
              jsonschema.validate(instance=bom, schema=schema)
              print("SBOM schema valido (CycloneDX 1.6):", sbom_path)
          except jsonschema.ValidationError as e:
              print("SBOM schema invalido:", e.message, file=sys.stderr)
              raise SystemExit(1)
          PYEOF
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom
          path: artifacts/trust/sbom.cyclonedx.json
          if-no-files-found: warn

  # ── 4. Manifesto de integridade ──────────────────────────────────────────
  manifest:
    name: Integrity Manifest
    runs-on: ubuntu-latest
    needs: [security-audit, license-check]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Generate SHA-256 manifest
        run: |
          mkdir -p artifacts/trust
          find . \
            \( -path './.git' -o -path './.git/*' \
              -o -path './target' -o -path './target/*' \
              -o -path './.logs' -o -path './.logs/*' \
              -o -path './artifacts' -o -path './artifacts/*' \) -prune \
            -o -type f -print | LC_ALL=C sort | while IFS= read -r f; do
              path="${f#./}"
              hash=$(sha256sum "$f" | awk '{print $1}')
              echo "$hash  $path"
            done > artifacts/trust/MANIFEST.sha256
          echo "Ficheiros no manifesto: $(wc -l < artifacts/trust/MANIFEST.sha256)"
      - name: Upload manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: manifest
          path: artifacts/trust/MANIFEST.sha256

  # ── 5. Publicar release com provenance attestation ───────────────────────
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, sbom, manifest]
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0  # necessário para git describe (semver-checks)

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: release-artifacts/

      - name: Check semver compatibility
        # Verifica que a nova versão não quebra a API pública em relação à anterior.
        # Relevante para integradores AP que dependem de estabilidade de interface.
        run: |
          cargo install cargo-semver-checks --locked
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -z "$PREV_TAG" ]; then
            echo "::notice::Sem tag anterior — semver check ignorado (primeiro release)"
          else
            echo "A comparar contra $PREV_TAG"
            cargo semver-checks --baseline-rev "$PREV_TAG" --workspace
          fi

      - name: Install Cosign (keyless signing)
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign artifacts (Sigstore Transparency Log)
        # Keyless — usa OIDC do GitHub Actions como identidade; sem chaves privadas.
        # Verificar: cosign verify-blob --bundle MANIFEST.sha256.bundle MANIFEST.sha256
        run: |
          cosign sign-blob --yes \
            --bundle release-artifacts/manifest/MANIFEST.sha256.bundle \
            release-artifacts/manifest/MANIFEST.sha256
          cosign sign-blob --yes \
            --bundle release-artifacts/sbom/sbom.cyclonedx.json.bundle \
            release-artifacts/sbom/sbom.cyclonedx.json

      - name: Prepare release notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          VERSION="${TAG#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md \
            || echo "Ver CHANGELOG.md para detalhes.")
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8  # v2.3.2
        with:
          tag_name: ${{ github.ref_name }}
          name: "normordis-kernel ${{ github.ref_name }}"
          body: |
            ${{ steps.notes.outputs.notes }}

            ---

            **Verificação de integridade:**
            ```sh
            sha256sum -c MANIFEST.sha256
            ```

            **Verificar assinatura Cosign (keyless):**
            ```sh
            cosign verify-blob \
              --bundle MANIFEST.sha256.bundle \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity-regexp "^https://github.com/carloscanutocosta/normordis-kernel/" \
              MANIFEST.sha256
            ```

            **Auditoria de segurança:** `cargo audit` sem vulnerabilidades
            **Licenças:** `cargo deny check` conforme EUPL-1.2
            **SBOM:** `sbom.cyclonedx.json` (schema CycloneDX 1.6 validado)
          files: |
            release-artifacts/manifest/MANIFEST.sha256
            release-artifacts/manifest/MANIFEST.sha256.bundle
            release-artifacts/sbom/sbom.cyclonedx.json
            release-artifacts/sbom/sbom.cyclonedx.json.bundle
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Attest build provenance (SLSA L2)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: |
            release-artifacts/manifest/MANIFEST.sha256
            release-artifacts/sbom/sbom.cyclonedx.json

      - name: Attest SBOM (CRA — art. 13)
        uses: actions/attest-sbom@bd218ad0dbcb3e146bd073d1d9c6d78e08aa8a0b  # v2.4.0
        with:
          subject-path: release-artifacts/manifest/MANIFEST.sha256
          sbom-path: release-artifacts/sbom/sbom.cyclonedx.json
