# cargo-deny configuration — normordis-kernel
# https://embarkstudios.github.io/cargo-deny/
#
# Executar: cargo deny check

[advisories]
# RustSec advisory database
db-urls = ["https://github.com/rustsec/advisory-db"]
# Unmaintained: verificar todas as dependências (workspace + transitivas)
unmaintained = "all"
# Yanked crates: bloquear
yanked = "deny"
ignore = [
  # rsa usado apenas para verificação pública de assinaturas JWT RSA.
  # Não há uso de RsaPrivateKey, assinatura ou desencriptação privada.
  "RUSTSEC-2023-0071",
  # bincode 1.3.3 chega por hyphenation/syntect na cadeia Typst/PDF.
  # Advisory de manutenção, sem upgrade seguro directo neste grafo.
  "RUSTSEC-2025-0141",
  # paste chega por hayagriva/rav1e na cadeia Typst/PDF.
  # Advisory de manutenção, sem upgrade seguro directo neste grafo.
  "RUSTSEC-2024-0436",
  # yaml-rust chega por syntect na cadeia Typst/PDF.
  # Advisory de manutenção, sem upgrade seguro directo neste grafo.
  "RUSTSEC-2024-0320",
]

[licenses]
# Licenças permitidas para dependências do normordis-kernel.
# Critério: compatíveis com EUPL-1.2 (copyleft fraco ou permissivas).
# No cargo-deny v2, tudo o que não está em `allow` é automaticamente negado.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "NCSA",
  "CDLA-Permissive-2.0",
  "ISC",
  "Zlib",
  "CC0-1.0",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "OpenSSL",
  "BSL-1.0",
  "MPL-2.0",
  "EUPL-1.2",
]
confidence-threshold = 0.8

[[licenses.exceptions]]
# ring — crate de criptografia com licença própria (OpenSSL + ISC + MIT)
name = "ring"
version = "*"
allow = ["MIT", "ISC", "OpenSSL"]

[bans]
multiple-versions = "warn"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
